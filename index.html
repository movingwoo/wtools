<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>W-Tools</title>
<meta name="description" content="MOVINGWOO Web Tools">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#2563eb">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1116">
<link rel="icon" href="assets/favicon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" integrity="sha384-mgWScxWVKP8F7PBbpNp7i/aSb17kN0LcifBpahAplF3Mn0GR4/u1oMpWIm2rD8yY" crossorigin="anonymous" defer></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du" crossorigin="anonymous" defer></script>
<script type="module" src="js/main.js"></script>
</head>
<body>
<div id="external-resource-warning" class="external-warning hidden" role="alert">
  외부 라이브러리를 불러오지 못했습니다. 홈과 기본 도구는 사용할 수 있지만 일부 기능에는 네트워크 연결이 필요합니다.
</div>
<div id="update-notice" class="update-notice hidden" role="status" aria-live="polite">
  <span>새 버전을 사용할 수 있습니다.</span>
  <button id="update-apply" class="btn small" type="button">새 버전 적용</button>
</div>
<div id="app">
  <aside id="sidebar" aria-label="도구 메뉴">
    <a class="brand" href="#/">W-Tools</a>
    <input id="search" type="search" placeholder="도구 검색 (/)" autocomplete="off"
      role="combobox" aria-controls="nav" aria-expanded="false" aria-autocomplete="list">
    <div id="detect-result" class="detect-result hidden" aria-live="polite"></div>
    <nav id="nav"></nav>
    <button id="sidebar-top" type="button" aria-label="사이드바 맨 위로" title="맨 위로" aria-hidden="true"></button>
  </aside>
  <main id="content"></main>
</div>
<button id="menu-btn" type="button" aria-label="도구 메뉴 열기" aria-controls="sidebar" aria-expanded="false">☰</button>
</body>
</html>
